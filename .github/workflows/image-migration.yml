name: Image Migration & CDN Link Replacement

on:
  push:
    branches:
      - main
      - master
    paths:
      - '_posts/**'
      - 'images/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - '_posts/**'
      - 'images/**'

jobs:
  migrate-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout blog-images repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/blog-images
          path: blog-images
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pillow pyyaml

      - name: Detect and migrate new images
        id: migrate
        run: |
          python .github/scripts/migrate-images.py
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          IMAGES_REPO_PATH: blog-images

      - name: Replace image links in markdown
        id: replace
        run: |
          python .github/scripts/replace-image-links.py
        env:
          REPO_OWNER: ${{ github.repository_owner }}

      - name: Commit and push changes to blog-images
        if: steps.migrate.outputs.images_migrated == 'true'
        run: |
          cd blog-images
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-migrate images from main repository" || echo "No changes to commit"
          git push

      - name: Commit and push markdown changes
        if: steps.replace.outputs.links_replaced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git commit -m "chore: replace image links with jsDelivr CDN URLs" || echo "No changes to commit"
          git push

      - name: Comment on PR
        if: github.event_name == 'pull_request' && (steps.migrate.outputs.images_migrated == 'true' || steps.replace.outputs.links_replaced == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Image migration completed!\n\n- Images migrated to blog-images repository\n- Markdown links updated to use jsDelivr CDN\n\nImages will be cached by jsDelivr CDN for faster loading in mainland China.'
            })
